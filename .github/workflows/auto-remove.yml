name: Auto Remove Dead Versions

on:
  schedule:
    - cron: '43 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  update-packages:
    name: Remove Dead Versions
    runs-on: ubuntu-24.04-arm
    environment:
      name: Production (gh only)
      deployment: false
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install komac
        uses: UnownPlain/install-komac@main
        with:
          version: nightly
          repo: unpn-org/Komac
          linux_libc: musl
          compression: zst

      - name: Remove Dead Versions
        env:
          KOMAC_FORK_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.UPDATE_TOKEN }}
        run: |
          jq -r '.vanity_url_packages[]' tasks/auto-remove.json | while read -r pkg_id; do
            komac list-versions "$pkg_id" --json |
              jq -r '.[0:-1][]' |
              while read -r version; do
                komac remove "$pkg_id" --version "$version" --submit --no-warning --reason 'Old Vanity URL version'
              done
          done

          jq -r '.remove_dead_versions[]' tasks/auto-remove.json | while read -r pkg_id; do
            komac remove-dead-versions "$pkg_id" --auto
          done
