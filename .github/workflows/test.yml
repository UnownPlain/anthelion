name: Test

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      packages:
        description: Package IDs to test (space-separated)
        required: false
        type: string

permissions: {}

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  detect-changes:
    name: Detect Changed Shards
    if: ${{ !inputs.packages }}
    runs-on: ubuntu-slim
    timeout-minutes: 5
    concurrency:
      group: test-detect-changes-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: shards/**
          files_ignore: |
            shards/**/*.disabled
            shards/auto-remove.json

  test:
    name: Test
    needs: detect-changes
    if: always() && (needs.detect-changes.outputs.any_changed == 'true' || inputs.packages)
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 10
    concurrency:
      group: test-job-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Environment
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.13
          install_args: bun

      - name: Install Dependencies
        run: bun ci --production

      - name: Test Packages
        run: |
          if [ -n "$PACKAGES" ]; then
            PACKAGE_IDS="$PACKAGES"
          else
            PACKAGE_IDS=""
            for file in $CHANGED_FILES; do
              PACKAGE_IDS+="$(basename "${file%.*}") "
            done
            PACKAGE_IDS="${PACKAGE_IDS% }"
          fi

          bun shard-test "$PACKAGE_IDS" --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ needs.detect-changes.outputs.changed_files }}
          PACKAGES: ${{ inputs.packages }}
