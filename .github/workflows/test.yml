name: Test

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      packages:
        description: Package IDs to test (space-separated)
        required: false
        type: string

permissions: {}

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  detect-changes:
    name: Detect Changed Tasks
    if: ${{ !inputs.packages }}
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
      changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: tasks/**

  test:
    name: Test
    needs: detect-changes
    if: always() && (needs.detect-changes.outputs.any_changed == 'true' || inputs.packages)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Install Dependencies
        run: bun ci --production

      - name: Test Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ needs.detect-changes.outputs.changed_files }}
          PACKAGES: ${{ inputs.packages }}
        run: |
          if [ -n "$PACKAGES" ]; then
            PACKAGE_IDS="$PACKAGES"
          else
            PACKAGE_IDS=""
            for file in $CHANGED_FILES; do
              PACKAGE_IDS+="$(basename "${file%.*}") "
            done
            PACKAGE_IDS="${PACKAGE_IDS% }"
          fi

          bun pkgtest "$PACKAGE_IDS" --dry-run
