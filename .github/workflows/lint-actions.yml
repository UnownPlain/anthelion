name: Lint Actions

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  detect-workflow-changes:
    name: Detect Workflow Changes
    runs-on: ubuntu-slim
    timeout-minutes: 5
    concurrency:
      group: lint-actions-detect-workflow-changes-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    outputs:
      workflows_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get Changed Workflow Files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: .github/workflows/**

  actionlint:
    name: actionlint
    needs: detect-workflow-changes
    if: ${{ needs.detect-workflow-changes.outputs.workflows_changed == 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    concurrency:
      group: lint-actions-actionlint-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run actionlint
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install actionlint
          actionlint -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    concurrency:
      group: lint-actions-zizmor-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          persona: pedantic
