name: Lint Actions

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  detect-workflow-changes:
    name: Detect Workflow Changes
    runs-on: ubuntu-slim
    timeout-minutes: 5
    concurrency:
      group: lint-actions-detect-workflow-changes-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    outputs:
      workflows_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Changed Workflow Files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: .github/workflows/**

  actionlint:
    name: actionlint
    needs: detect-workflow-changes
    if: ${{ needs.detect-workflow-changes.outputs.workflows_changed == 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    concurrency:
      group: lint-actions-actionlint-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install actionlint
          # rhysd/actionlint#639
          actionlint -color -ignore 'unexpected key "deployment" for "environment" section'

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 5
    concurrency:
      group: lint-actions-zizmor-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          persona: pedantic
