name: Fork Maintenance

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  fork-maintenance:
    name: Fork Maintenance
    runs-on: ubuntu-slim
    environment:
      name: Production (gh only)
      deployment: false
    timeout-minutes: 5
    steps:
      - name: Install komac
        uses: UnownPlain/install-komac@main
        with:
          version: nightly
          repo: unpn-org/Komac
          linux_libc: musl
          compression: zst
      - parallel:
          - name: Sync Fork
            run: komac sync
            env:
              KOMAC_FORK_OWNER: ${{ github.repository_owner }}
              GITHUB_TOKEN: ${{ secrets.UPDATE_TOKEN }}
          - name: Cleanup Branches
            run: komac cleanup -a
            env:
              KOMAC_FORK_OWNER: ${{ github.repository_owner }}
              GITHUB_TOKEN: ${{ secrets.UPDATE_TOKEN }}
