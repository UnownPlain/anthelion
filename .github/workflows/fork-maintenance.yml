name: Fork Maintenance

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  fork-maintenance:
    name: Fork Maintenance
    runs-on: ubuntu-slim
    environment:
      name: Production (gh only)
      deployment: false
    timeout-minutes: 5
    steps:
      - name: Install komac
        uses: UnownPlain/install-komac@6749d7a2887abebe4effde5332b8585e9f328702 # main
        with:
          version: nightly
          repo: unpn-org/Komac
          linux_libc: musl
          compression: zst

      - name: Sync Fork & Cleanup Branches
        run: |
          komac sync
          komac cleanup -a
        env:
          KOMAC_FORK_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.UPDATE_TOKEN }}
